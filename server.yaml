name: truenas-mcp
image: mcp/truenas-mcp
type: server
meta:
  category: storage
  tags:
    - storage
    - truenas
    - nas
    - virtualization
about:
  title: TrueNAS MCP Server
  description: A professional-grade MCP server for managing TrueNAS SCALE and Core systems via natural language.
  icon: https://www.truenas.com/favicon.ico
source:
  project: https://github.com/savisaar2/truenas-mcp
config:
  description: Configure the connection to your TrueNAS system. Use ws:// for Username/Password and wss:// for API Key.
  secrets:
    - name: truenas.api_key
      env: TRUENAS_API_KEY
      example: 1-ABC...
    - name: truenas.password
      env: TRUENAS_PASS
      example: my-secret-password
  env:
    - name: TRUENAS_URL
      example: ws://192.168.1.100:8081/websocket
    - name: TRUENAS_USER
      example: root
